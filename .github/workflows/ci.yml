name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          # Use mock AI provider — no real Groq key required in CI
          AI_PROVIDER: mock
          AI_FALLBACK_PROVIDER: none
          JIGYASA_REQUIRE_RAG: "false"
          JIGYASA_ALLOW_GENERAL_SPACE_ANSWERS: "true"
          APP_BASE_URL: "http://localhost:3000"

      - name: Run lint
        run: npm run lint

      - name: Run type check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          # Use mock AI provider — no real Groq key required in CI
          AI_PROVIDER: mock
          AI_FALLBACK_PROVIDER: none
          JIGYASA_REQUIRE_RAG: "false"
          JIGYASA_ALLOW_GENERAL_SPACE_ANSWERS: "true"
          APP_BASE_URL: "http://localhost:3000"
          # Next.js needs this to skip telemetry
          NEXT_TELEMETRY_DISABLED: "1"
